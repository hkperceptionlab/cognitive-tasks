<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>자애·감사 명상 (성인)</title>
  <meta name="theme-color" content="#4A6B4D" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./icons/icon.svg" />
  <link rel="apple-touch-icon" href="./icons/icon.svg" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
</head>
<body>
  <div id="app"></div>

  <script type="module">
    import { startLovingKindness } from '../loving-kindness-common/loving-kindness.js';

    // 성인: 세이지그린 어두운 톤(#4A6B4D, 흰 텍스트 대비 6.0:1 AA), 표준 크기·표준 문구.
    startLovingKindness({
      id: 'loving-kindness-adults',
      accent: '#4A6B4D',
      scale: 1,
      tone: 'std',
    });

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    }
  </script>
</body>
</html>
