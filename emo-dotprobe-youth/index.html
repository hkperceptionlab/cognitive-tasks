<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>정서 점탐사 (청소년)</title>
  <meta name="theme-color" content="#5C4A73" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./icons/icon.svg" />
  <link rel="apple-touch-icon" href="./icons/icon.svg" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
</head>
<body>
  <div id="app"></div>

  <script type="module">
    import { startEmoDotprobe } from '../emo-dotprobe-common/emo-dotprobe.js';

    // 청소년: reps 4 → 정서가2×일치/불일치2×위치2 = 8칸 ×4 = 32시행((정서가×일치/불일치)셀당 8), 기본 크기.
    startEmoDotprobe({
      id: 'emo-dotprobe-youth',
      wordSet: 'youth',
      reps: 4,
      scale: 1,
    });

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    }
  </script>
</body>
</html>
